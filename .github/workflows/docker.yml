name: Build and push image

# `bundle` in the paths filter is the SUBMODULE POINTER file in the superproject
# tree. It changes exactly when a new bundle release is pinned (the SHA advances),
# so this workflow fires on every new bundle — not on arbitrary pushes to main.
#
# Note: pushes made by the `Build bundle` workflow use the built-in GITHUB_TOKEN,
# which does NOT trigger new workflow runs (GitHub prevents recursive loops).
# To chain the two workflows automatically, replace GITHUB_TOKEN in bundle.yml
# with a fine-grained PAT stored as a repo secret.

on:
  push:
    branches: [main]
    paths:
      - bundle                            # submodule pointer changed → new release
      - .github/workflows/docker.yml      # workflow file itself changed
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to ghcr.io

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main + all submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./bundle
          file:    ./bundle/Dockerfile
          push:    true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
